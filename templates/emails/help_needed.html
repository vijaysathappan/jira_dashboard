<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { padding: 20px; border: 1px solid #eee; border-radius: 5px; max-width: 600px; margin: 0 auto; }
        .header { background: #ff5630; color: white; padding: 10px 20px; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; }
        .footer { margin-top: 20px; font-size: 0.8em; color: #777; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Help Needed: {{ employee.name }}</h2>
        </div>
        <div class="content">
            <p>Hello Manager,</p>
            <p><strong>{{ employee.name }}</strong> has requested help with the following description:</p>
            
            <div style="background: #f9f9f9; padding: 15px; border-left: 4px solid #ff5630; margin: 20px 0;">
                <p style="white-space: pre-wrap;">{{ description }}</p>
            </div>
            
            <p>Please reach out to {{ employee.name }} to assist.</p>
        </div>
        <div class="footer">
            &copy; 2026 WorkTrack Pro. This is an automated email.
        </div>
    </div>
</body>
</html>
