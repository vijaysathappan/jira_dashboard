version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=your_production_secret_key_here
      - DATABASE_URL=sqlite:////app/instance/database.db
    volumes:
      - sqlite_data:/app/instance
      - uploads_data:/app/static/uploads

volumes:
  sqlite_data:
  uploads_data:
